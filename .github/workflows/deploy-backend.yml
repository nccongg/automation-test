name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - production/backend-api # đổi thành branch bạn muốn deploy từ đó

env:
  ACR_NAME: agentworkeracr
  ACR_LOGIN_SERVER: agentworkeracr.azurecr.io
  IMAGE_NAME: backend-api
  IMAGE_TAG: ${{ github.sha }}
  RESOURCE_GROUP: agent-worker
  WEBAPP_NAME: automation-test-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            $ACR_LOGIN_SERVER \
            -u "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG ./server
          docker tag $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Push Docker image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Update Azure App Service image
        run: |
          if ! az webapp config container set \
            --resource-group $RESOURCE_GROUP \
            --name $WEBAPP_NAME \
            --container-image-name $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
            --container-registry-url https://$ACR_LOGIN_SERVER \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"; then
            echo "Falling back to legacy Azure CLI container flags"
            az webapp config container set \
              --resource-group $RESOURCE_GROUP \
              --name $WEBAPP_NAME \
              --docker-custom-image-name $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG \
              --docker-registry-server-url https://$ACR_LOGIN_SERVER \
              --docker-registry-server-user "${{ secrets.ACR_USERNAME }}" \
              --docker-registry-server-password "${{ secrets.ACR_PASSWORD }}"
          fi

      - name: Restart Azure App Service
        run: |
          az webapp restart \
            --resource-group $RESOURCE_GROUP \
            --name $WEBAPP_NAME

      - name: Wait for container to boot
        run: sleep 20

      - name: Smoke test /api/health
        run: |
          APP_HOST=$(az webapp show \
            --resource-group $RESOURCE_GROUP \
            --name $WEBAPP_NAME \
            --query defaultHostName \
            --output tsv)

          for attempt in {1..20}; do
            if curl -sf "https://$APP_HOST/api/health"; then
              exit 0
            fi
            echo "Health check attempt $attempt failed; retrying..."
            sleep 10
          done

          echo "Health check failed"
          exit 1

      - name: Smoke test /api/auth/google route
        run: |
          APP_HOST=$(az webapp show \
            --resource-group $RESOURCE_GROUP \
            --name $WEBAPP_NAME \
            --query defaultHostName \
            --output tsv)

          HTTP_STATUS=$(curl -sS \
            -o /tmp/google-login-response.json \
            -w "%{http_code}" \
            -X POST "https://$APP_HOST/api/auth/google" \
            -H "Content-Type: application/json" \
            -d '{"credential":"test"}')

          cat /tmp/google-login-response.json

          if [ "$HTTP_STATUS" != "401" ]; then
            echo "Expected /api/auth/google to return 401 for a fake credential, got $HTTP_STATUS"
            exit 1
          fi

          grep -q "Invalid Google credential" /tmp/google-login-response.json
