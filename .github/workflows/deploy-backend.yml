name: Deploy Backend to Azure Container Instance

on:
  push:
    branches:
      - production/backend-api # đổi thành branch bạn muốn deploy từ đó

env:
  ACR_NAME: agentworkeracr
  ACR_LOGIN_SERVER: agentworkeracr.azurecr.io
  IMAGE_NAME: backend-api
  RESOURCE_GROUP: agent-worker
  CONTAINER_NAME: backend-api
  LOCATION: indonesiacentral
  DNS_LABEL: backend-api-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            $ACR_LOGIN_SERVER \
            -u "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest ./server

      - name: Push Docker image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Delete old container
        run: |
          az container delete \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_NAME \
            --yes || true

      - name: Create new container
        run: |
          az container create \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_NAME \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            --registry-login-server $ACR_LOGIN_SERVER \
            --registry-username "${{ secrets.ACR_USERNAME }}" \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --cpu 1 \
            --memory 1.5 \
            --ports 5000 \
            --ip-address Public \
            --dns-name-label $DNS_LABEL \
            --location $LOCATION \
            --os-type Linux \
            --restart-policy Always \
            --environment-variables \
              NODE_ENV=production \
              PORT=5000 \
              LLM_PROVIDER=gemini \
              LLM_MODEL=gemini-3.5-flash \
              EXECUTION_LLM_PROVIDER=gemini \
              EXECUTION_LLM_MODEL=gemini-3.5-flash \
              AGENT_WORKER_BASE_URL=http://agent-worker-prod.indonesiacentral.azurecontainer.io:8001 \
              SERVER_BASE_URL=http://backend-api-prod.indonesiacentral.azurecontainer.io:5000 \
              SMTP_HOST=smtp.gmail.com \
              SMTP_PORT=587 \
              MAIL_FROM="Automation Test <nchicongit@gmail.com>" \
            --secure-environment-variables \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              AGENT_CALLBACK_SECRET="${{ secrets.AGENT_CALLBACK_SECRET }}" \
              SMTP_USER="${{ secrets.SMTP_USER }}" \
              SMTP_PASS="${{ secrets.SMTP_PASS }}"

      - name: Wait for container to boot
        run: sleep 20

      - name: Smoke test /api/health
        run: |
          curl -sf "http://${DNS_LABEL}.${LOCATION}.azurecontainer.io:5000/api/health" || \
            (echo "Health check failed" && exit 1)
